AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  quantum-workspace-sync: cross-device progress sync for the Quantum Workspace.
  A dumb, versioned KV — one DynamoDB item per user holding their qc:* progress
  snapshot — behind an HTTP API whose Cognito JWT authorizer validates tokens
  from the existing quantum-workspace user pool. ALL merge intelligence lives
  in the web client (web/src/lib/progress-merge.ts); the server only enforces
  optimistic concurrency (version check -> 409 on conflict), so the domain
  rules exist in exactly one place. Deploy in us-east-2 (the pool's region).

Parameters:
  UserPoolId:
    Type: String
    Default: us-east-2_aRydPmAjj
    Description: The existing quantum-workspace Cognito user pool.
  UserPoolClientId:
    Type: String
    Default: 2sg8nejrf2j8p28j6khjil99ir
    Description: The quantum-workspace-web app client (JWT audience).
  SiteOrigin:
    Type: String
    Default: https://quantum.altivum.ai
    Description: Production origin allowed by CORS.
  MaxConcurrency:
    Type: Number
    Default: 10
    Description: Reserved concurrency — a hard ceiling on cost and abuse.
  LogRetentionInDays:
    Type: Number
    Default: 30
  AlertEmail:
    Type: String
    Default: christian.perez@altivum.io
    Description: >
      Operator email for the human notification path. Receives every CloudWatch
      alarm in this stack. Each SNS email subscription must be confirmed once
      from the inbox before it delivers.

Resources:
  ProgressTable:
    Type: AWS::DynamoDB::Table
    # Learner progress is the crown jewels — never delete with the stack.
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: quantum-workspace-progress
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - { Key: Project, Value: quantum }
        - { Key: Feature, Value: workspace-sync }
        - { Key: CostCategory, Value: workspace }

  SyncApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      # Stage-wide throttle, sized from the client's actual cadence: the sync
      # client PUTs one snapshot per debounce window (20s trailing / 60s
      # maxWait — web/src/components/progress-sync.tsx), i.e. at most ~1
      # PUT/user/min plus a GET at page load, so 5 rps steady with a burst of
      # 10 never touches a real user. Without it, the only ceiling is
      # ReservedConcurrentExecutions=10; a flood of MAX_SNAPSHOT_BYTES (256KB,
      # index.mjs) PUTs at ~100-200 rps inside that ceiling is ~256 WCU per
      # write against the PAY_PER_REQUEST table — roughly $115-230/hr of
      # on-demand DynamoDB write cost. The throttle caps that blast radius at
      # the front door; excess requests get 429 before invoking anything.
      DefaultRouteSettings:
        ThrottlingRateLimit: 5
        ThrottlingBurstLimit: 10
      CorsConfiguration:
        AllowOrigins:
          - !Ref SiteOrigin
          - http://localhost:3000
        AllowMethods: [GET, PUT, DELETE, OPTIONS]
        AllowHeaders: [authorization, content-type]
        MaxAge: 3600
      Auth:
        DefaultAuthorizer: CognitoJwt
        Authorizers:
          CognitoJwt:
            IdentitySource: $request.header.Authorization
            JwtConfiguration:
              issuer: !Sub https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPoolId}
              audience:
                - !Ref UserPoolClientId

  SyncFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: quantum-workspace-sync
      Runtime: nodejs22.x
      Handler: index.handler
      MemorySize: 256
      Timeout: 10
      ReservedConcurrentExecutions: !Ref MaxConcurrency
      Environment:
        Variables:
          TABLE_NAME: !Ref ProgressTable
      Policies:
        - Statement:
            # DeleteItem serves DELETE /progress (account deletion) — still
            # scoped to this one table, still keyed only by the verified sub.
            - Effect: Allow
              Action: [dynamodb:GetItem, dynamodb:PutItem, dynamodb:DeleteItem]
              Resource: !GetAtt ProgressTable.Arn
      Events:
        GetProgress:
          Type: HttpApi
          Properties:
            ApiId: !Ref SyncApi
            Method: GET
            Path: /progress
        PutProgress:
          Type: HttpApi
          Properties:
            ApiId: !Ref SyncApi
            Method: PUT
            Path: /progress
        DeleteProgress:
          Type: HttpApi
          Properties:
            ApiId: !Ref SyncApi
            Method: DELETE
            Path: /progress
      Tags:
        Project: quantum
        Feature: workspace-sync
        CostCategory: workspace

  SyncLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      LogGroupName: !Sub /aws/lambda/${SyncFunction}
      RetentionInDays: !Ref LogRetentionInDays

  # ---- Human notification path (pattern proven in lambda/qpu/template.yaml) ----
  # This stack holds the crown jewels (learner progress) behind a paid,
  # internet-facing API, so silent failure modes are not acceptable: a
  # throwing function loses syncs, sustained throttling means learners are
  # being turned away, and a write-capacity spike is money burning.
  AlertsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: quantum-workspace-sync-alerts
      Subscription:
        - Endpoint: !Ref AlertEmail
          Protocol: email

  SyncErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: quantum-workspace-sync-errors
      AlarmDescription: >-
        The quantum-workspace-sync function threw at least one error in 5
        minutes. Learner progress snapshots may not be saving or loading.
        Check the function's log group.
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref SyncFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref AlertsTopic]

  SyncThrottlesAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: quantum-workspace-sync-throttles
      AlarmDescription: >-
        The quantum-workspace-sync function was throttled (reserved
        concurrency exhausted) in the last 5 minutes. Either real traffic
        outgrew MaxConcurrency or something is flooding the API past the
        stage throttle. Check API request counts before raising the ceiling.
      Namespace: AWS/Lambda
      MetricName: Throttles
      Dimensions:
        - Name: FunctionName
          Value: !Ref SyncFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref AlertsTopic]

  # Legitimate peak is small: ~1 snapshot PUT/user/min (client debounce 20s /
  # maxWait 60s), each a few KB — even 50 concurrently active learners is on
  # the order of 1,000 write units per 5 minutes. 10,000 per 5-minute period
  # is ~10x that peak, yet a 256KB-PUT flood (256 WCU each) trips it inside
  # one period. Three consecutive periods = sustained, not a blip.
  TableWriteSpikeAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: quantum-workspace-sync-write-spike
      AlarmDescription: >-
        The quantum-workspace-progress table consumed >10,000 write capacity
        units per 5 minutes for 15 sustained minutes — roughly 10x the
        legitimate peak. Likely a large-snapshot flood; on-demand billing
        means this is direct spend. Check API traffic and consider lowering
        the stage throttle.
      Namespace: AWS/DynamoDB
      MetricName: ConsumedWriteCapacityUnits
      Dimensions:
        - Name: TableName
          Value: !Ref ProgressTable
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 3
      Threshold: 10000
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref AlertsTopic]

  Api5xxAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: quantum-workspace-sync-5xx
      AlarmDescription: >-
        The sync HTTP API returned at least one 5xx in 5 minutes. The
        function, its DynamoDB access, or the JWT authorizer integration is
        failing server-side; syncs are being lost while this persists.
      Namespace: AWS/ApiGateway
      MetricName: 5xx
      Dimensions:
        - Name: ApiId
          Value: !Ref SyncApi
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref AlertsTopic]

Outputs:
  SyncUrl:
    Description: Set as NEXT_PUBLIC_SYNC_URL in the Amplify app environment.
    Value: !Sub https://${SyncApi}.execute-api.${AWS::Region}.amazonaws.com
  TableName:
    Value: !Ref ProgressTable
  AlertsTopicArn:
    Description: The SNS topic every CloudWatch alarm in this stack notifies.
    Value: !Ref AlertsTopic
