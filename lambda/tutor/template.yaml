AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  Ask the margin — a response-streaming, Bedrock-backed lesson tutor for the
  quantum curriculum. A single stateless Lambda behind a Function URL.

# NOTE: abuse/cost monitoring has two layers. (1) Per-IP rate limiting is enforced
# at the edge by a CloudFront + WAFv2 rate-based rule (see edge.yaml, a separate
# us-east-1 stack); requests over the per-IP limit get a 429 before reaching this
# function. With OAC in front, set FunctionUrlAuthType=AWS_IAM so the raw Function
# URL cannot be hit directly, bypassing the edge. (2) ReservedConcurrentExecutions
# remains a hard ceiling on simultaneous billable invocations. A CloudWatch alarm
# "quantum-tutor-high-invocations" (Invocations Sum 1h >500 -> "quantum-tutor-alerts"
# SNS topic) is managed separately and not re-declared here.

Parameters:
  ModelId:
    Type: String
    Description: >
      Bedrock model / inference-profile the handler invokes (also the
      TUTOR_MODEL_ID env var). For this deployment it is the application
      inference-profile ARN — get the current one with
      `aws bedrock list-inference-profiles`. Request model access first.
  FoundationModelId:
    Type: String
    Default: anthropic.claude-haiku-4-5-20251001-v1:0
    Description: >
      The underlying foundation model the inference profile routes to. Used to
      scope the IAM policy: invoking an application inference profile is
      authorized against BOTH the profile ARN (ModelId) AND the foundation-model
      ARN in each region the profile can route to.
  AllowedOrigin:
    Type: String
    Default: https://quantum.altivum.ai
    Description: Origin allowed to call the Function URL (your site).
  MaxConcurrency:
    Type: Number
    Default: 5
    MinValue: 1
    Description: >
      Reserved concurrency — a HARD ceiling on simultaneous (billable)
      invocations. A second-layer cost control behind the edge WAF rate limit:
      excess requests are throttled rather than fanning out into unbounded paid
      Bedrock generations.
  FunctionUrlAuthType:
    Type: String
    Default: AWS_IAM
    AllowedValues: [AWS_IAM, NONE]
    Description: >
      Function URL auth. AWS_IAM (default, end state) locks the URL so ONLY the
      CloudFront Origin Access Control in edge.yaml can invoke it — closing the
      public bypass. NONE is used transiently during the cutover (front CloudFront
      first, verify, then flip to AWS_IAM). OAC REQUIRES AWS_IAM.

Resources:
  TutorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: quantum-tutor
      # nodejs22.x (LTS) — nodejs20.x reached end-of-life 2026-04-30 (no security patches).
      Runtime: nodejs22.x
      Handler: index.handler
      CodeUri: ./
      MemorySize: 512
      Timeout: 60
      # HARD cost ceiling (second layer behind the edge WAF rate limit).
      ReservedConcurrentExecutions: !Ref MaxConcurrency
      # Cost-attribution tags on the Lambda's OWN compute. The dominant cost
      # (Bedrock inference) is attributed separately via the application
      # inference profile passed as ModelId; keep these keys in sync with that
      # profile's tags and activate them as cost-allocation tags in Billing.
      Tags:
        Project: quantum
        Feature: ask-tutor
        CostCategory: genai
      Environment:
        Variables:
          TUTOR_MODEL_ID: !Ref ModelId
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModelWithResponseStream
              # Least privilege: only the one inference profile this function uses,
              # plus the foundation-model ARNs it routes to (an app inference
              # profile authorizes against both). NOT Resource "*".
              Resource:
                - !Ref ModelId
                - !Sub "arn:aws:bedrock:us-east-1::foundation-model/${FoundationModelId}"
                - !Sub "arn:aws:bedrock:us-east-2::foundation-model/${FoundationModelId}"
                - !Sub "arn:aws:bedrock:us-west-2::foundation-model/${FoundationModelId}"
      FunctionUrlConfig:
        AuthType: !Ref FunctionUrlAuthType
        InvokeMode: RESPONSE_STREAM
        Cors:
          # CORS is a browser-enforced UX allowlist, NOT access control. The real
          # access control is AuthType AWS_IAM + the edge WAF (edge.yaml).
          # x-amz-content-sha256 is allowed so the browser's POST preflight passes
          # once OAC requires the body-hash header on POST.
          AllowOrigins:
            - !Ref AllowedOrigin
          AllowMethods:
            - POST
          AllowHeaders:
            - content-type
            - x-amz-content-sha256

Outputs:
  TutorUrl:
    Description: Set this as NEXT_PUBLIC_TUTOR_URL in Amplify.
    Value: !GetAtt TutorFunctionUrl.FunctionUrl
