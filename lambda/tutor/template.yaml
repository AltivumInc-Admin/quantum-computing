AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  Ask the margin — a response-streaming, Bedrock-backed lesson tutor for the
  quantum curriculum. A single stateless Lambda behind a Function URL.

# NOTE: abuse/cost monitoring has two layers. (1) Per-IP rate limiting is enforced
# at the edge by a CloudFront + WAFv2 rate-based rule (see edge.yaml, a separate
# us-east-1 stack); requests over the per-IP limit get a 429 before reaching this
# function. With OAC in front, set FunctionUrlAuthType=AWS_IAM so the raw Function
# URL cannot be hit directly, bypassing the edge. (2) ReservedConcurrentExecutions
# remains a hard ceiling on simultaneous billable invocations. The high-invocations
# alarm (Invocations Sum 1h >500) is now stack-managed below as
# HighInvocationsAlarm; its console-created predecessor "quantum-tutor-high-invocations"
# must be deleted manually after the first deploy of this version (see README /
# the PR runbook) — CloudFormation cannot adopt a live alarm by reusing its name.

Parameters:
  ModelId:
    Type: String
    Description: >
      Bedrock model / inference-profile the handler invokes (also the
      TUTOR_MODEL_ID env var). For this deployment it is the application
      inference-profile ARN — get the current one with
      `aws bedrock list-inference-profiles`. Request model access first.
  FoundationModelId:
    Type: String
    Default: anthropic.claude-haiku-4-5-20251001-v1:0
    Description: >
      The underlying foundation model the inference profile routes to. Used to
      scope the IAM policy: invoking an application inference profile is
      authorized against BOTH the profile ARN (ModelId) AND the foundation-model
      ARN in each region the profile can route to.
  AllowedOrigin:
    Type: String
    Default: https://quantum.altivum.ai
    Description: Origin allowed to call the Function URL (your site).
  MaxConcurrency:
    Type: Number
    Default: 5
    MinValue: 1
    Description: >
      Reserved concurrency — a HARD ceiling on simultaneous (billable)
      invocations. A second-layer cost control behind the edge WAF rate limit:
      excess requests are throttled rather than fanning out into unbounded paid
      Bedrock generations.
  FunctionUrlAuthType:
    Type: String
    Default: AWS_IAM
    AllowedValues: [AWS_IAM, NONE]
    Description: >
      Function URL auth. AWS_IAM (default, end state) locks the URL so ONLY the
      CloudFront Origin Access Control in edge.yaml can invoke it — closing the
      public bypass. NONE is used transiently during the cutover (front CloudFront
      first, verify, then flip to AWS_IAM). OAC REQUIRES AWS_IAM.
  LogRetentionInDays:
    Type: Number
    Default: 30
    # Only the values CloudWatch Logs accepts — constrain here so a bad value fails
    # fast at `sam validate` / change-set creation rather than mid-deploy with an
    # InvalidParameterException + rollback.
    AllowedValues:
      [1, 3, 5, 7, 14, 30, 60, 90, 120, 150, 180, 365, 400, 545, 731, 1096, 1827, 2192, 2557, 2922, 3288, 3653]
    Description: >
      CloudWatch Logs retention (days) for the function's log group, which is
      declared explicitly below so it is stack-managed with a finite retention
      instead of the Lambda-auto-created group's never-expire default.
  AlertEmail:
    Type: String
    Default: christian.perez@altivum.io
    Description: >
      Operator email for the human notification path. Receives every CloudWatch
      alarm in this stack. Each SNS email subscription must be confirmed once
      from the inbox before it delivers.

Resources:
  TutorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: quantum-tutor
      # nodejs22.x (LTS) — nodejs20.x reached end-of-life 2026-04-30 (no security patches).
      Runtime: nodejs22.x
      Handler: index.handler
      CodeUri: ./
      MemorySize: 512
      Timeout: 60
      # HARD cost ceiling (second layer behind the edge WAF rate limit).
      ReservedConcurrentExecutions: !Ref MaxConcurrency
      # Cost-attribution tags on the Lambda's OWN compute. The dominant cost
      # (Bedrock inference) is attributed separately via the application
      # inference profile passed as ModelId; keep these keys in sync with that
      # profile's tags and activate them as cost-allocation tags in Billing.
      Tags:
        Project: quantum
        Feature: ask-tutor
        CostCategory: genai
      Environment:
        Variables:
          TUTOR_MODEL_ID: !Ref ModelId
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModelWithResponseStream
              # Least privilege: only the one inference profile this function uses,
              # plus the foundation-model ARNs it routes to (an app inference
              # profile authorizes against both). NOT Resource "*".
              Resource:
                - !Ref ModelId
                - !Sub "arn:aws:bedrock:us-east-1::foundation-model/${FoundationModelId}"
                - !Sub "arn:aws:bedrock:us-east-2::foundation-model/${FoundationModelId}"
                - !Sub "arn:aws:bedrock:us-west-2::foundation-model/${FoundationModelId}"
      FunctionUrlConfig:
        AuthType: !Ref FunctionUrlAuthType
        InvokeMode: RESPONSE_STREAM
        Cors:
          # CORS is a browser-enforced UX allowlist, NOT access control. The real
          # access control is AuthType AWS_IAM + the edge WAF (edge.yaml).
          # x-amz-content-sha256 is allowed so the browser's POST preflight passes
          # once OAC requires the body-hash header on POST.
          AllowOrigins:
            - !Ref AllowedOrigin
          AllowMethods:
            - POST
          AllowHeaders:
            - content-type
            - x-amz-content-sha256
          # Without MaxAge the browser falls back to a 5s preflight cache, so
          # nearly every question pays an extra cross-region OPTIONS round trip
          # before the POST. One hour is safe: this allowlist changes only on a
          # stack deploy, which is exactly when a stale cache should expire.
          MaxAge: 3600

  # Stack-managed log group with a finite retention. Lambda otherwise auto-creates
  # /aws/lambda/<fn> with never-expire retention; declaring it here (the conventional
  # name) gives CloudFormation ownership + a retention policy.
  # ‼️ One-time import on the EXISTING stack: this function was deployed before the
  # group was in the template, so the group already exists and a plain deploy fails
  # "resource already exists". Do a CloudFormation resource IMPORT (preserves logs) or
  # delete the auto-created group first. See README → "Log retention (now in the template)".
  TutorLogGroup:
    Type: AWS::Logs::LogGroup
    # Retain the group (and its log history) on stack delete/replacement, AND so the
    # one-time resource IMPORT documented in the README is accepted: CloudFormation
    # REQUIRES a DeletionPolicy on every resource being imported.
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      # Literal, NOT !Sub "/aws/lambda/${TutorFunction}": the group was adopted
      # into the stack via resource IMPORT, which stores the literal physical
      # name. CloudFormation compares the stored literal against a raw !Sub
      # expression, flags LogGroupName as changed (RequiresRecreation: Always),
      # and plans a REPLACEMENT that would fail on the existing name. The
      # function name is pinned (FunctionName: quantum-tutor), so the literal
      # can never drift from the resolved expression.
      LogGroupName: /aws/lambda/quantum-tutor
      RetentionInDays: !Ref LogRetentionInDays

  # ---- Human notification path (pattern proven in lambda/qpu/template.yaml) ----
  # NOT named "quantum-tutor-alerts": that topic already exists in this account,
  # created by hand for the old console-managed alarm. SNS CreateTopic is
  # idempotent by name, so CloudFormation would silently claim the live topic
  # (and delete it — with its confirmed subscriptions — on stack delete or
  # rollback). A distinct name keeps ownership unambiguous; the old topic can
  # be retired manually once nothing references it.
  AlertsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: quantum-tutor-stack-alerts
      Subscription:
        - Endpoint: !Ref AlertEmail
          Protocol: email

  # index.mjs streams inside a committed HTTP 200, so a Bedrock failure raises
  # neither the HTTP status nor the Lambda Errors metric; its only trace is the
  # console.error(JSON.stringify({ tutorError: true, ... })) line. This filter
  # turns that line into a metric. The pattern is a literal quoted term, NOT the
  # JSON selector { $.tutorError IS TRUE }: JSON selectors only match log events
  # that are valid JSON in full, and this function logs in Lambda's default text
  # format, which prefixes console.error output with timestamp/request-id — the
  # selector would never fire. template.test.mjs pins the term to the actual
  # emission in index.mjs, so the two cannot drift.
  TutorErrorMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref TutorLogGroup
      FilterPattern: '"tutorError"'
      MetricTransformations:
        - MetricNamespace: QuantumTutor
          MetricName: TutorError
          MetricValue: "1"
          Unit: Count

  TutorErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: quantum-tutor-errors
      AlarmDescription: >-
        The tutor emitted at least one tutorError log line in 5 minutes — a
        Bedrock call failed after the 200 was committed, so learners saw the
        in-band error sentinel. Neither HTTP status nor Lambda Errors ever
        reflects this. Check the function's log group for the error detail.
      Namespace: QuantumTutor
      MetricName: TutorError
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref AlertsTopic]

  # index.mjs logs {"tutorCorpusMissing":true} when the corpus import fails. That
  # path is invisible to every other signal: the handler still returns HTTP 200
  # and streams OUT_OF_SCOPE_MESSAGE, so Lambda Errors stays flat and the tutor
  # is silently dead for EVERY learner on EVERY lesson. This is the only alarm
  # that can catch it.
  TutorCorpusMissingMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref TutorLogGroup
      FilterPattern: '"tutorCorpusMissing"'
      MetricTransformations:
        - MetricNamespace: QuantumTutor
          MetricName: TutorCorpusMissing
          MetricValue: "1"
          Unit: Count

  TutorCorpusMissingAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: quantum-tutor-corpus-missing
      AlarmDescription: >-
        The tutor could not load its grounding corpus, so it answers
        OUT_OF_SCOPE to every question on every lesson while still returning
        HTTP 200. Neither the Errors metric nor the status code reflects this.
        Redeploy: predeploy rebuilds the corpus and gates on its freshness.
      Namespace: QuantumTutor
      MetricName: TutorCorpusMissing
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref AlertsTopic]

  # Stack-managed successor to the console-created "quantum-tutor-high-invocations"
  # alarm (same metric, statistic, period, and threshold — verified against the
  # live alarm before folding it in). The name is deliberately DIFFERENT:
  # PutMetricAlarm upserts by name, so reusing the existing name would either
  # fail stack creation ("resource already exists") or silently seize a resource
  # this stack did not create — and then delete it on rollback. Runbook: delete
  # the console alarm immediately after the first deploy of this version.
  HighInvocationsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: quantum-tutor-high-invocations-stack
      AlarmDescription: >-
        The tutor Lambda was invoked more than 500 times in an hour —
        possible abuse of the Function URL past the edge WAF, and every
        invocation is a paid Bedrock generation. Check the edge WAF metrics
        and consider lowering MaxConcurrency while investigating.
      Namespace: AWS/Lambda
      MetricName: Invocations
      Dimensions:
        - Name: FunctionName
          Value: !Ref TutorFunction
      Statistic: Sum
      Period: 3600
      EvaluationPeriods: 1
      Threshold: 500
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref AlertsTopic]

Outputs:
  TutorUrl:
    Description: Set this as NEXT_PUBLIC_TUTOR_URL in Amplify.
    Value: !GetAtt TutorFunctionUrl.FunctionUrl
  AlertsTopicArn:
    Description: The SNS topic every CloudWatch alarm in this stack notifies.
    Value: !Ref AlertsTopic
