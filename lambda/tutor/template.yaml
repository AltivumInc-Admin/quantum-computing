AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  Ask the margin — a response-streaming, Bedrock-backed lesson tutor for the
  quantum curriculum. A single stateless Lambda behind a Function URL.

Parameters:
  ModelId:
    Type: String
    Description: >
      Bedrock model id to invoke. For cost attribution, pass the APPLICATION
      inference-profile ARN (arn:aws:bedrock:REGION:ACCT:application-inference-profile/...)
      so its cost-allocation tags flow to Cost Explorer / CUR. Create it from the
      system profile with `aws bedrock create-inference-profile`. A plain
      us.anthropic.claude-... id also works but is not cost-tagged.
  AllowedOrigin:
    Type: String
    Default: https://quantum.altivum.ai
    Description: Origin allowed to call the Function URL (your site).

Resources:
  TutorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: quantum-tutor
      Runtime: nodejs20.x
      Handler: index.handler
      CodeUri: ./
      MemorySize: 512
      Timeout: 60
      # Cost-attribution tags. The dominant cost (Bedrock inference) is attributed
      # via the application inference profile passed as ModelId; these tag the
      # Lambda's own compute. Keep the keys in sync with that profile's tags and
      # activate them as cost-allocation tags in Billing.
      Tags:
        Project: quantum
        Feature: ask-tutor
        CostCategory: genai
      Environment:
        Variables:
          TUTOR_MODEL_ID: !Ref ModelId
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModelWithResponseStream
              # Tighten to the specific model/inference-profile ARN in production.
              Resource: "*"
      FunctionUrlConfig:
        AuthType: NONE
        InvokeMode: RESPONSE_STREAM
        Cors:
          AllowOrigins:
            - !Ref AllowedOrigin
          AllowMethods:
            - POST
          AllowHeaders:
            - content-type

Outputs:
  TutorUrl:
    Description: Set this as NEXT_PUBLIC_TUTOR_URL in Amplify.
    Value: !GetAtt TutorFunctionUrl.FunctionUrl
