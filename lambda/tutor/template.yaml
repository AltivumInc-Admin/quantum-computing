AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  Ask the margin — a response-streaming, Bedrock-backed lesson tutor for the
  quantum curriculum. A single stateless Lambda behind a Function URL.

Parameters:
  ModelId:
    Type: String
    Description: >
      Bedrock model / inference-profile the handler invokes (also the
      TUTOR_MODEL_ID env var). For this deployment it is the application
      inference-profile ARN — get the current one with
      `aws bedrock list-inference-profiles`. Request model access first.
  FoundationModelId:
    Type: String
    Default: anthropic.claude-haiku-4-5-20251001-v1:0
    Description: >
      The underlying foundation model the inference profile routes to. Used to
      scope the IAM policy: invoking an application inference profile is
      authorized against BOTH the profile ARN (ModelId) AND the foundation-model
      ARN in each region the profile can route to.
  AllowedOrigin:
    Type: String
    Default: https://quantum.altivum.ai
    Description: Origin allowed to call the Function URL (your site).
  MaxConcurrency:
    Type: Number
    Default: 5
    MinValue: 1
    Description: >
      Reserved concurrency — a HARD ceiling on simultaneous (billable)
      invocations. The Function URL is public (AuthType NONE), so this is the
      load-bearing cost/abuse control: excess requests are throttled (429)
      rather than fanning out into unbounded paid Bedrock generations.
  AlarmEmail:
    Type: String
    Default: ""
    Description: >
      Optional email to notify when the abuse alarm fires. Leave blank to create
      the alarm + topic without a subscriber (subscribe later). A non-blank value
      sends a one-time SNS confirmation email that must be accepted.

Conditions:
  HasAlarmEmail: !Not [!Equals [!Ref AlarmEmail, ""]]

Resources:
  TutorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: quantum-tutor
      # nodejs22.x (LTS) — nodejs20.x reached end-of-life 2026-04-30 (no security patches).
      Runtime: nodejs22.x
      Handler: index.handler
      CodeUri: ./
      MemorySize: 512
      Timeout: 60
      # HARD cost ceiling on a public (AuthType NONE) Bedrock-invoking endpoint.
      ReservedConcurrentExecutions: !Ref MaxConcurrency
      Environment:
        Variables:
          TUTOR_MODEL_ID: !Ref ModelId
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModelWithResponseStream
              # Least privilege: only the one inference profile this function uses,
              # plus the foundation-model ARNs it routes to (an app inference
              # profile authorizes against both). NOT Resource "*".
              Resource:
                - !Ref ModelId
                - !Sub "arn:aws:bedrock:us-east-1::foundation-model/${FoundationModelId}"
                - !Sub "arn:aws:bedrock:us-east-2::foundation-model/${FoundationModelId}"
                - !Sub "arn:aws:bedrock:us-west-2::foundation-model/${FoundationModelId}"
      FunctionUrlConfig:
        AuthType: NONE
        InvokeMode: RESPONSE_STREAM
        Cors:
          # NOTE: CORS is a browser-enforced UX allowlist, NOT an access control —
          # it does not stop curl/scripted clients. Abuse is bounded by
          # ReservedConcurrentExecutions + the alarm below (and optionally WAF).
          AllowOrigins:
            - !Ref AllowedOrigin
          AllowMethods:
            - POST
          AllowHeaders:
            - content-type

  # --- Observability: catch abuse/cost before the bill arrives ---------------
  TutorAlarmTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: quantum-tutor-alarms

  TutorAlarmEmailSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasAlarmEmail
    Properties:
      TopicArn: !Ref TutorAlarmTopic
      Protocol: email
      Endpoint: !Ref AlarmEmail

  TutorHighInvocationsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: quantum-tutor-high-invocations
      AlarmDescription: >
        Tutor invocations exceeded the expected hourly volume on a public Function
        URL — possible abuse. Investigate before costs accrue. Does not block
        requests (UX is preserved); the reserved-concurrency cap is the hard limit.
      Namespace: AWS/Lambda
      MetricName: Invocations
      Dimensions:
        - Name: FunctionName
          Value: quantum-tutor
      Statistic: Sum
      Period: 3600
      EvaluationPeriods: 1
      Threshold: 500
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref TutorAlarmTopic

Outputs:
  TutorUrl:
    Description: Set this as NEXT_PUBLIC_TUTOR_URL in Amplify.
    Value: !GetAtt TutorFunctionUrl.FunctionUrl
  AlarmTopicArn:
    Description: SNS topic for tutor abuse alarms — subscribe an endpoint to receive alerts.
    Value: !Ref TutorAlarmTopic
