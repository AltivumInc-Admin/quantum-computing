AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  quantum-qpu-submit: the server-side, hard-capped path by which a learner spends
  real money on QPU hardware. Submission runs under this stack's Braket execution
  role (the browser never holds AWS creds — it presents a Cognito JWT from the
  existing quantum-workspace pool). A DynamoDB spend ledger enforces a per-user
  lifetime cap AND a per-day global kill-switch atomically, BEFORE any Braket task
  is created. Deploy in us-east-2 (the pool's region); IQM Garnet itself is in
  eu-north-1 (the Lambda targets that region for CreateQuantumTask). PR-1 = core;
  the WAF/CloudFront edge + Budgets-driven auto-kill land in PR-2.

Parameters:
  UserPoolId:
    Type: String
    Default: us-east-2_aRydPmAjj
    Description: The existing quantum-workspace Cognito user pool.
  UserPoolClientId:
    Type: String
    Default: 2sg8nejrf2j8p28j6khjil99ir
    Description: The quantum-workspace-web app client (JWT audience).
  SiteOrigin:
    Type: String
    Default: https://quantum.altivum.ai
  ResultsBucket:
    Type: String
    Description: >
      S3 bucket for Braket results — MUST exist in eu-north-1 (IQM Garnet's
      region) and be named amazon-braket-* so the Braket service can write to it.
      Pre-provisioned by the operator (see README).
  MaxConcurrency:
    Type: Number
    Default: 5
    Description: Reserved concurrency — a hard ceiling on request rate.
  EdgeSecretName:
    Type: String
    Default: quantum-qpu-edge-secret
    Description: >
      Name of the Secrets Manager secret holding the x-qpu-edge shared secret.
      Its value is resolved at deploy time (never passed on the command line or
      stored in the template) and injected as the Lambda's EDGE_SECRET env, so a
      request lacking the header CloudFront injects is rejected — the public HTTP
      API URL can't be hit directly to bypass the WAF. The secret must exist (in
      this region) before deploy; edge.yaml resolves the SAME secret by name.
  MonthlyBraketBudget:
    Type: Number
    Default: 150
    Description: >
      Monthly Braket spend budget (USD). At 80%/100% it trips the in-app
      kill-switch (all new submissions 503) — the hard stop AWS Budgets alone
      cannot provide. Consistent with the $15/day in-app global cap.
  LogRetentionInDays:
    Type: Number
    Default: 30
  AlertEmail:
    Type: String
    Default: christian.perez@altivum.io
    Description: >
      Operator email for the human notification path. Receives budget threshold
      crossings, kill-switch trips, and every CloudWatch alarm in this stack.
      Each SNS email subscription must be confirmed once from the inbox before
      it delivers.

Resources:
  # Spend ledger: USER#<sub> rows (cap/spent), DAY#<date> rows (global daily
  # counter, TTL-expired), and a single KILL row (the in-app kill-switch).
  LedgerTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: quantum-qpu-ledger
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - { Key: Project, Value: quantum }
        - { Key: Feature, Value: qpu-submit }
        - { Key: CostCategory, Value: qpu }

  # One row per accepted submission: idempotency guard + reconciliation record +
  # R9 hardware-badge provenance (taskArn, resultS3Uri, circuitHash).
  TasksTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: quantum-qpu-tasks
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: idempotencyKey
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
        - AttributeName: createdAt
          AttributeType: N
      KeySchema:
        - AttributeName: idempotencyKey
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: userId-index
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - { Key: Project, Value: quantum }
        - { Key: Feature, Value: qpu-submit }
        - { Key: CostCategory, Value: qpu }

  QpuApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins:
          - !Ref SiteOrigin
          - http://localhost:3000
        AllowMethods: [GET, POST, OPTIONS]
        AllowHeaders: [authorization, content-type]
        MaxAge: 3600
      Auth:
        DefaultAuthorizer: CognitoJwt
        Authorizers:
          CognitoJwt:
            IdentitySource: $request.header.Authorization
            JwtConfiguration:
              issuer: !Sub https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPoolId}
              audience:
                - !Ref UserPoolClientId

  QpuFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: quantum-qpu-submit
      Runtime: nodejs22.x
      Handler: index.handler
      CodeUri: ./
      MemorySize: 256
      Timeout: 20
      ReservedConcurrentExecutions: !Ref MaxConcurrency
      Environment:
        Variables:
          LEDGER_TABLE: !Ref LedgerTable
          TASKS_TABLE: !Ref TasksTable
          RESULTS_BUCKET: !Ref ResultsBucket
          EDGE_SECRET: !Sub "{{resolve:secretsmanager:${EdgeSecretName}:SecretString}}"
      Policies:
        # The spend ledger (USER#/DAY#/KILL/CRED# rows) + tasks table.
        # TransactWriteItems is authorized via its constituent item actions
        # (Put/Update/ConditionCheck), not a dedicated action.
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:UpdateItem
                - dynamodb:ConditionCheckItem
                - dynamodb:Query
              Resource:
                - !GetAtt LedgerTable.Arn
                - !GetAtt TasksTable.Arn
                - !Sub ${TasksTable.Arn}/index/userId-index
        # Submit ONLY to IQM Garnet, and read back the resulting tasks.
        - Statement:
            - Effect: Allow
              Action:
                - braket:CreateQuantumTask
                - braket:GetQuantumTask
              Resource:
                - arn:aws:braket:eu-north-1::device/qpu/iqm/Garnet
                - !Sub arn:aws:braket:eu-north-1:${AWS::AccountId}:quantum-task/*
        # Braket writes results here under the caller's identity.
        - Statement:
            - Effect: Allow
              Action: [s3:PutObject, s3:GetBucketLocation, s3:ListBucket]
              Resource:
                - !Sub arn:aws:s3:::${ResultsBucket}
                - !Sub arn:aws:s3:::${ResultsBucket}/*
      Events:
        Submit:
          Type: HttpApi
          Properties:
            ApiId: !Ref QpuApi
            Method: POST
            Path: /qpu/submit
        Budget:
          Type: HttpApi
          Properties:
            ApiId: !Ref QpuApi
            Method: GET
            Path: /qpu/budget
        CredentialStatus:
          Type: HttpApi
          Properties:
            ApiId: !Ref QpuApi
            Method: GET
            Path: /qpu/credential
        CredentialClaim:
          Type: HttpApi
          Properties:
            ApiId: !Ref QpuApi
            Method: POST
            Path: /qpu/credential
      Tags:
        Project: quantum
        Feature: qpu-submit
        CostCategory: qpu

  QpuLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      LogGroupName: !Sub /aws/lambda/${QpuFunction}
      RetentionInDays: !Ref LogRetentionInDays

  # ---- Reconcile: trues the ledger against real hardware outcomes ----
  # A scheduled poll marks SUBMITTED tasks COMPLETED (lighting the hardware
  # credential from real provenance) or refunds FAILED/CANCELLED runs. Every
  # write is guarded on status, so re-runs never double-apply.
  ReconcileFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: quantum-qpu-reconcile
      Runtime: nodejs22.x
      Handler: reconcile.handler
      CodeUri: ./
      MemorySize: 256
      Timeout: 120
      ReservedConcurrentExecutions: 1
      Environment:
        Variables:
          LEDGER_TABLE: !Ref LedgerTable
          TASKS_TABLE: !Ref TasksTable
      Policies:
        # Scan the tasks table; the refund/mark updates (incl. the TransactWriteItems,
        # which authorizes per-item as UpdateItem) touch both tables.
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:Scan
                - dynamodb:UpdateItem
              Resource:
                - !GetAtt LedgerTable.Arn
                - !GetAtt TasksTable.Arn
        - Statement:
            - Effect: Allow
              Action: braket:GetQuantumTask
              Resource: !Sub arn:aws:braket:eu-north-1:${AWS::AccountId}:quantum-task/*
      Events:
        Poll:
          Type: Schedule
          Properties:
            Schedule: rate(5 minutes)
            Description: Reconcile SUBMITTED QPU tasks against Braket.
      Tags:
        Project: quantum
        Feature: qpu-submit
        CostCategory: qpu

  ReconcileLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      LogGroupName: !Sub /aws/lambda/${ReconcileFunction}
      RetentionInDays: !Ref LogRetentionInDays

  # ---- Budgets-driven kill-switch (AWS Budgets only ALERTS; this hard-stops) ----
  KillSwitchTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: quantum-qpu-killswitch
      # A human hears every message on this topic (budget breach, kill trip)
      # directly from SNS, even if the kill-switch Lambda is broken or its
      # subscription is lost.
      Subscription:
        - Endpoint: !Ref AlertEmail
          Protocol: email

  KillSwitchTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics: [!Ref KillSwitchTopic]
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AWSBudgetsSNSPublishingPermissions
            Effect: Allow
            Principal:
              Service: budgets.amazonaws.com
            Action: SNS:Publish
            Resource: !Ref KillSwitchTopic
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
              ArnLike:
                aws:SourceArn: !Sub arn:aws:budgets::${AWS::AccountId}:*

  KillSwitchFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: quantum-qpu-killswitch
      Runtime: nodejs22.x
      Handler: killswitch.handler
      CodeUri: ./
      MemorySize: 128
      Timeout: 10
      ReservedConcurrentExecutions: 2
      Environment:
        Variables:
          LEDGER_TABLE: !Ref LedgerTable
      Policies:
        - Statement:
            - Effect: Allow
              Action: dynamodb:PutItem
              Resource: !GetAtt LedgerTable.Arn
      Events:
        BudgetBreach:
          Type: SNS
          Properties:
            Topic: !Ref KillSwitchTopic
      Tags:
        Project: quantum
        Feature: qpu-submit
        CostCategory: qpu

  KillSwitchLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      LogGroupName: !Sub /aws/lambda/${KillSwitchFunction}
      RetentionInDays: !Ref LogRetentionInDays

  # Monthly Braket budget whose 80%/100% ACTUAL-spend notifications publish to the
  # kill-switch topic. This is the backstop for the in-app $15/day global cap.
  QpuBudget:
    Type: AWS::Budgets::Budget
    Properties:
      Budget:
        # No explicit BudgetName: any change to NotificationsWithSubscribers
        # REPLACES this resource, and CloudFormation creates the replacement
        # before deleting the old one, so a fixed name would collide with
        # itself and fail the stack update. A generated name keeps the budget
        # updatable (the old quantum-qpu-monthly budget is deleted on cleanup).
        BudgetType: COST
        TimeUnit: MONTHLY
        BudgetLimit:
          Amount: !Ref MonthlyBraketBudget
          Unit: USD
        CostFilters:
          Service:
            - Amazon Braket
      # Each threshold notifies BOTH the kill-switch topic (the machine path)
      # and the operator's inbox (the human path), so a budget crossing is
      # never silent even if a Lambda or subscription is broken.
      NotificationsWithSubscribers:
        - Notification:
            NotificationType: ACTUAL
            ComparisonOperator: GREATER_THAN
            Threshold: 80
            ThresholdType: PERCENTAGE
          Subscribers:
            - SubscriptionType: SNS
              Address: !Ref KillSwitchTopic
            - SubscriptionType: EMAIL
              Address: !Ref AlertEmail
        - Notification:
            NotificationType: ACTUAL
            ComparisonOperator: GREATER_THAN
            Threshold: 100
            ThresholdType: PERCENTAGE
          Subscribers:
            - SubscriptionType: SNS
              Address: !Ref KillSwitchTopic
            - SubscriptionType: EMAIL
              Address: !Ref AlertEmail

  # ---- Human notification path: every alarm below lands in an inbox ----
  # This stack spends real money, so silent failure modes are not acceptable:
  # a broken kill-switch Lambda disarms the hard stop, a dead reconciler stops
  # refunds, and an orphaned RESERVED row is money charged with no task ARN.
  AlertsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: quantum-qpu-alerts
      Subscription:
        - Endpoint: !Ref AlertEmail
          Protocol: email

  SubmitErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: quantum-qpu-submit-errors
      AlarmDescription: >-
        The quantum-qpu-submit function threw at least one error in 5 minutes.
        Learners may be unable to submit, or a reservation may have been
        charged without a task ARN. Check the function's log group.
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref QpuFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref AlertsTopic]

  ReconcileErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: quantum-qpu-reconcile-errors
      AlarmDescription: >-
        The quantum-qpu-reconcile function threw at least one error in 5
        minutes. Refunds for failed or cancelled runs and hardware-badge
        completion are stalled until it recovers.
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref ReconcileFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref AlertsTopic]

  KillSwitchErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: quantum-qpu-killswitch-errors
      AlarmDescription: >-
        The quantum-qpu-killswitch function threw at least one error in 5
        minutes. A budget breach may NOT have tripped the KILL row, which
        means the hard spend stop could be disarmed. Verify the KILL row in
        the quantum-qpu-ledger table immediately.
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref KillSwitchFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref AlertsTopic]

  # The reconciler runs on a rate(5 minutes) schedule, so 12 invocations are
  # expected per hour. Zero invocations across a full hour means the schedule
  # rule is dead, disabled, or deleted; TreatMissingData is breaching so a
  # rule that never fires (and so emits no metric at all) also alerts.
  ReconcileStalledAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: quantum-qpu-reconcile-stalled
      AlarmDescription: >-
        The quantum-qpu-reconcile function was not invoked at all in the last
        hour despite its 5-minute schedule. Stuck reservations are no longer
        being refunded and completed runs are not being recorded.
      Namespace: AWS/Lambda
      MetricName: Invocations
      Dimensions:
        - Name: FunctionName
          Value: !Ref ReconcileFunction
      Statistic: Sum
      Period: 3600
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: LessThanThreshold
      TreatMissingData: breaching
      AlarmActions: [!Ref AlertsTopic]

  # reconcile.mjs logs 'qpu-reconcile: orphaned row <key> (status <s>) ...' for
  # a stuck RESERVED row it cannot resolve (no task ARN): money charged with
  # nothing to show for it. Until now that log line was the ONLY trace; this
  # turns it into a metric and an alarm. template.test.mjs asserts the phrase
  # below still literally appears in reconcile.mjs, so the two cannot drift.
  OrphanedRowMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref ReconcileLogGroup
      FilterPattern: '"qpu-reconcile: orphaned row"'
      MetricTransformations:
        - MetricNamespace: QuantumQpu
          MetricName: OrphanedMoneyRow
          MetricValue: "1"
          Unit: Count

  OrphanedRowAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: quantum-qpu-orphaned-money-row
      AlarmDescription: >-
        The reconciler found at least one orphaned RESERVED row, which is
        reserved learner money with no task ARN to resolve it against. It
        needs manual review in the quantum-qpu-tasks table; the alarm re-fires
        every reconcile run until the row is resolved.
      Namespace: QuantumQpu
      MetricName: OrphanedMoneyRow
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref AlertsTopic]

Outputs:
  QpuUrl:
    Description: Set as NEXT_PUBLIC_QPU_URL in the Amplify app environment (PR-3).
    Value: !Sub https://${QpuApi}.execute-api.${AWS::Region}.amazonaws.com
  LedgerTableName:
    Value: !Ref LedgerTable
  TasksTableName:
    Value: !Ref TasksTable
  KillSwitchTopicArn:
    Description: The SNS topic the Braket budget publishes to (trips the KILL flag).
    Value: !Ref KillSwitchTopic
  AlertsTopicArn:
    Description: The SNS topic every CloudWatch alarm in this stack notifies.
    Value: !Ref AlertsTopic
