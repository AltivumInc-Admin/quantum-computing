name: CI

# Gate every PR and every push to main on the full test + lint + build-smoke
# matrix. main is intended to be a protected branch with the three jobs below
# (python, web, build-smoke) as required status checks, so Amplify only ever
# auto-builds a commit that has already passed CI.
#
# Version pinning: keep PYTHON_VERSION / NODE_VERSION aligned with the Amplify
# build image (Amplify console -> App settings -> Build settings / build logs).
# Python is pinned to 3.12 because openfermionpyscf/pyscf (the [full] extra)
# ship wheels for 3.12; newer interpreters may lack them.

on:
  pull_request:
  push:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python tests + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # MUST be .[dev,full] (not .[dev]) or the pytest.importorskip tests
          # for pennylane / openfermion silently skip and CI is green-but-blind.
          pip install -e ".[dev,full]"
          # qcsim is a separate package the parity + contract tests import; it
          # is NOT installed by the root project, so install it explicitly.
          pip install -e ./qcsim

      - name: Run tests
        run: make test

      - name: Lint
        run: make lint

      # Drift gate: the committed manifests must match a fresh scan, so the
      # curriculum catalog (sections.ts), the runnable Run-button gate, and the
      # qcsim wheel pin can never silently diverge from the notebooks on disk.
      - name: Check content manifests are in sync
        run: python scripts/validate_runnable.py --check

  web:
    name: Web tests + lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      # The tutor Lambda has its own deps + lockfile; the web job's `npm ci` runs
      # in web/ and never touches them. node --test imports index.mjs, which imports
      # @aws-sdk/client-bedrock-runtime at module top, so install first.
      - name: Install tutor Lambda deps
        working-directory: lambda/tutor
        run: npm ci
      - name: Tutor Lambda handler test
        working-directory: lambda/tutor
        run: npm test

  build-smoke:
    name: JupyterLite + static export build smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      # build.sh creates its own .venv and downloads the Pyodide kernel; cache
      # both to keep the smoke build fast.
      - name: Cache JupyterLite build environment
        uses: actions/cache@v4
        with:
          path: |
            web/jupyterlite-build/.venv
            web/jupyterlite-build/.jupyterlite.doit.db
            web/jupyterlite-build/.cache
          key: jupyterlite-${{ runner.os }}-${{ hashFiles('web/jupyterlite-build/requirements.txt', 'qcsim/**/*.py', 'qcsim/pyproject.toml') }}

      - name: Build JupyterLite distribution (qcsim wheel -> Pyodide)
        run: bash web/jupyterlite-build/build.sh

      # build.sh regenerates the committed jupyter_lite_config.json from the actual
      # wheel name; assert the committed pin matches so a qcsim version bump can't
      # silently leave a stale kernel pin (and catches accidental hand-edits).
      - name: Assert committed lab config matches build.sh output
        run: git diff --exit-code -- web/jupyterlite-build/jupyter_lite_config.json

      # The lesson runtime self-hosts Pyodide under /pyodide/. Assert it was staged,
      # its version matches the runtime constant (no self-host/runtime drift), and
      # the {micropip, numpy} wheel closure the runtime needs is present — without
      # these wheels the same-origin boot would 404 and silently fall back to CDN.
      - name: Assert self-hosted Pyodide matches the runtime version + closure
        run: |
          test -f web/public/pyodide/pyodide.js || { echo "self-hosted pyodide.js missing"; exit 1; }
          ver=$(grep -oE 'PYODIDE_VERSION *= *"[0-9.]+"' web/src/lib/pyodide-runtime.ts | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          grep -q "\"version\": \"$ver\"" web/public/pyodide/pyodide-lock.json \
            || { echo "self-hosted pyodide-lock version != runtime $ver"; exit 1; }
          # Assert the STABLE closure roots only (micropip is always loadPackage'd;
          # numpy is qcsim's dependency). Transitive deps are computed from the lock
          # by build.sh and may change across Pyodide versions, so we don't pin them.
          for w in micropip numpy; do
            ls web/public/pyodide/$w-*.whl >/dev/null 2>&1 || { echo "missing closure root wheel: $w"; exit 1; }
          done
          echo "self-hosted Pyodide $ver OK (core + micropip/numpy dependency closure)"

      # The in-browser LAB kernel (JupyterLite) self-hosts its OWN Pyodide under
      # public/lab/static/pyodide/ (a different pin from the lesson runtime above) and
      # bundles the comm wheel into the same-origin piplite index, so a "Run in
      # Browser" never touches cdn.jsdelivr.net or pypi.org. Assert that wiring; the
      # Playwright smoke below also asserts ZERO third-party requests at runtime, but
      # this catches a broken self-host before paying for the browser run.
      - name: Assert the LAB kernel is wired fully same-origin
        run: |
          base=web/public/lab/static/pyodide
          test -f "$base/pyodide.js" || { echo "lab self-hosted pyodide.js missing"; exit 1; }
          # Closure roots: the kernel-boot packages that resolve via the Pyodide lock
          # (sqlite3, ipython, jedi) + micropip + the curriculum notebook imports
          # (numpy, matplotlib). Transitive deps are computed from the lock by build.sh.
          for w in micropip sqlite3 ipython jedi numpy matplotlib; do
            ls "$base/$w"-*.whl >/dev/null 2>&1 || { echo "missing lab closure root wheel: $w"; exit 1; }
          done
          # comm must be bundled in the local piplite index (else the kernel fetches it
          # from pypi.org on every boot — pyodide_kernel hard-imports it).
          python3 -c "import json,sys; d=json.load(open('web/public/lab/pypi/all.json')); sys.exit(0 if 'comm' in d else 'comm missing from local piplite index')"
          # The kernel must point at the self-hosted Pyodide and never fall back to PyPI.
          # Single-line python (semicolons) to avoid YAML/Python indentation pitfalls.
          python3 -c "import json,sys; d=json.load(open('web/public/lab/jupyter-lite.json')); s=d.get('jupyter-config-data',d); ks=s['litePluginSettings']['@jupyterlite/pyodide-kernel-extension:kernel']; u=ks.get('pyodideUrl',''); assert 'jsdelivr' not in u and u.startswith('./'), 'pyodideUrl not same-origin: '+repr(u); assert ks.get('disablePyPIFallback') is True, 'disablePyPIFallback not set'; print('lab kernel same-origin OK: pyodideUrl='+u)"
          echo "LAB self-host OK (Pyodide + closure + comm, no third-party CDN)"

      - name: Build static export
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Assert build artifacts exist
        run: |
          test -d web/out || { echo "missing web/out (static export)"; exit 1; }
          test -d web/public/lab || { echo "missing web/public/lab (JupyterLite)"; exit 1; }
          echo "Build artifacts present: web/out/ and web/public/lab/"

      # Real in-browser smoke: run a browser-runnable notebook under actual Pyodide
      # + the local qcsim wheel and assert its deterministic output. Reuses the
      # web/out/ + web/public/lab/ this job already built (no second build).
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('web/package-lock.json') }}
      - name: Install Playwright (chromium)
        working-directory: web
        run: npx playwright install --with-deps chromium
      - name: Pyodide in-browser smoke
        working-directory: web
        env:
          CI: "true"
        run: npx playwright test
