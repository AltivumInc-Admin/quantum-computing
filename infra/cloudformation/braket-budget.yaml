AWSTemplateFormatVersion: "2010-09-09"
Description: AWS Budget alarm for Amazon Braket spend

Parameters:
  MonthlyBudget:
    Type: Number
    Default: 50
    Description: Monthly budget threshold in USD
  NotificationEmail:
    Type: String
    Description: Email address for budget alerts

Resources:
  BraketBudget:
    Type: AWS::Budgets::Budget
    Properties:
      Budget:
        BudgetName: BraketQuantumWorkspaceBudget
        BudgetLimit:
          Amount: !Ref MonthlyBudget
          Unit: USD
        TimeUnit: MONTHLY
        BudgetType: COST
        CostFilters:
          Service:
            - Amazon Braket
      NotificationsWithSubscribers:
        # Thresholds are PERCENT of MonthlyBudget (the AWS default for
        # AWS::Budgets::Budget Notification), NOT dollar amounts. Stated
        # explicitly so the intent can't be misread as $50/$80/$100 when a
        # non-default MonthlyBudget is deployed.
        - Notification:
            NotificationType: ACTUAL
            ComparisonOperator: GREATER_THAN
            Threshold: 50
            ThresholdType: PERCENTAGE
          Subscribers:
            - SubscriptionType: EMAIL
              Address: !Ref NotificationEmail
        - Notification:
            NotificationType: ACTUAL
            ComparisonOperator: GREATER_THAN
            Threshold: 80
            ThresholdType: PERCENTAGE
          Subscribers:
            - SubscriptionType: EMAIL
              Address: !Ref NotificationEmail
        - Notification:
            NotificationType: FORECASTED
            ComparisonOperator: GREATER_THAN
            Threshold: 100
            ThresholdType: PERCENTAGE
          Subscribers:
            - SubscriptionType: EMAIL
              Address: !Ref NotificationEmail
