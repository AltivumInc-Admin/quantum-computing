# AWS Amplify Hosting custom HTTP response headers.
# Schema + monorepo placement verified against AWS docs:
#   https://docs.aws.amazon.com/amplify/latest/userguide/setting-custom-headers.html
#   https://docs.aws.amazon.com/amplify/latest/userguide/custom-header-YAML-format.html
#   https://docs.aws.amazon.com/amplify/latest/userguide/monorepo-custom-headers.html
# For a monorepo (appRoot: web) this file MUST live at the repository root.
#
# Pattern composition (per custom-header-YAML-format.html): headers are
# "applied to all URL file paths that match the pattern" — every matching
# pattern block contributes its headers, and the docs define no precedence
# when the SAME key appears in multiple blocks matching one path. To keep the
# result unambiguous, header keys are kept disjoint by design:
#   - the '/**' block carries ONLY security headers (no Cache-Control),
#   - the per-tree blocks below carry ONLY Cache-Control.
# A given response therefore composes from at most one block per header key.
#
# This file is the ONLY response-header surface for the static export — there
# is no server. HTML documents deliberately get NO Cache-Control override:
# Amplify invalidates them per deploy, which is exactly the freshness we want.
customHeaders:
  # ---------------------------------------------------------------- security
  # Baseline security headers on every response. Deliberately NOT a full CSP:
  # Pyodide needs wasm-unsafe-eval + worker-src blob:, and Next.js emits
  # inline scripts — a script-src/style-src policy is staged for later.
  #
  # frame-ancestors 'self' (not 'none'): nothing in web/src or web/public
  # frames same-origin content today (the /lab JupyterLite surface is opened
  # by top-level navigation, not an <iframe>), but the bundled JupyterLab UI
  # includes viewers that can render same-origin files in iframes. 'self'
  # blocks all third-party framing (the clickjacking threat) without ever
  # breaking the lab. X-Frame-Options: SAMEORIGIN mirrors it for legacy UAs.
  - pattern: '/**'
    headers:
      - key: 'Strict-Transport-Security'
        value: 'max-age=63072000; includeSubDomains'
      - key: 'X-Content-Type-Options'
        value: 'nosniff'
      - key: 'Referrer-Policy'
        value: 'strict-origin-when-cross-origin'
      - key: 'Permissions-Policy'
        value: 'camera=(), microphone=(), geolocation=()'
      - key: 'Content-Security-Policy'
        value: "frame-ancestors 'self'; object-src 'none'; base-uri 'self'"
      - key: 'X-Frame-Options'
        value: 'SAMEORIGIN'

  # ----------------------------------------------------------------- caching
  # JupyterLite emits content-hashed asset filenames under /lab/build/ and
  # version-pinned wheels under /lab/files/wheels/, so both are safe to cache
  # immutably — any rebuild changes the filename (and thus the URL), busting
  # the cache automatically. This makes repeat visits to the in-browser lab
  # instant.
  - pattern: '/lab/build/**'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=31536000, s-maxage=31536000, immutable'
  - pattern: '/lab/files/wheels/**'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=31536000, s-maxage=31536000, immutable'
  # Next.js static chunks are content-hashed (/_next/static/<hash>/…).
  - pattern: '/_next/static/**'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=31536000, s-maxage=31536000, immutable'
  # The Monaco editor core is staged into a VERSION-STAMPED directory
  # (/monaco/<version>/vs, scripts/stage-monaco.mjs — the loader path constant
  # web/src/lib/monaco-path.ts must agree or the build fails), so every URL in
  # the tree changes on an upgrade and `immutable` is correct by construction.
  # It has to be: Monaco's entry files (loader.js, editor/editor.main.js,
  # basic-languages/monaco.contribution.js) are UNHASHED names that reference
  # content-hashed siblings, so a cached-entry/new-chunks mismatch would break
  # every runnable cell — and `immutable` suppresses the revalidation that the
  # component's own "Reload page" retry depends on.
  - pattern: '/monaco/**'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=31536000, s-maxage=31536000, immutable'
  # The self-hosted Pyodide LESSON runtime is NOT version-stamped: build.sh
  # stages pyodide.js, pyodide.asm.js, the 8.6 MB pyodide.asm.wasm and
  # pyodide-lock.json under stable, unhashed names, so a version bump reuses the
  # same URLs. Under a year-long `immutable` grant those entries are also
  # independently evictable, so a partially-evicted cache after a bump yields an
  # Emscripten JS/wasm mismatch — which the runtime answers by falling back to
  # the jsdelivr CDN, reintroducing the third-party request the self-hosting
  # exists to remove. A bounded cache (same 1-day grant the unhashed /welcome/
  # tree gets) keeps repeat visits free of a re-download while capping that
  # window at a day, and revalidation is a cheap 304. Restore `immutable` here
  # once build.sh stages /pyodide/<version>/ (and PYODIDE_LOCAL_BASE in
  # web/src/lib/pyodide-runtime.ts points at it), the way Monaco now does.
  - pattern: '/pyodide/**'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=86400'
  # The LAB kernel's Pyodide distribution — a SECOND, separately-pinned copy
  # (web/jupyterlite-build/build.sh stages it at static/pyodide/, so
  # `jupyter lite build` emits it at /lab/static/pyodide/). Before this rule it
  # matched no pattern at all and fell through to Amplify's defaults, so all
  # 31 MB of it — an 8.6 MB pyodide.asm.wasm, a 2.4 MB python_stdlib.zip and the
  # staged wheel closure, every byte fetched on kernel boot — was revalidated
  # (and at max-age=0 re-downloaded) on EVERY "Run in browser".
  #
  # Bounded, not immutable, for exactly the reason /pyodide/** above is: this
  # tree carries the identical set of stable unhashed core names (pyodide.js,
  # pyodide.asm.js, pyodide.asm.wasm, python_stdlib.zip, pyodide-lock.json) that
  # a version bump reuses. Only the wheels beside them are version-stamped. Here
  # the stakes are higher than for the lesson runtime: a partially-evicted cache
  # after a bump yields an Emscripten JS/wasm mismatch and the lab kernel has NO
  # CDN fallback to fail over to — it simply never boots. Promote to immutable
  # once build.sh stages the core under a version-stamped path.
  - pattern: '/lab/static/pyodide/**'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=86400'
  # Welcome-page imagery keeps its filenames across deploys (unhashed), so it
  # gets a bounded 1-day cache instead of immutable.
  - pattern: '/welcome/**'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=86400'
