version: 1
applications:
  - appRoot: web
    frontend:
      phases:
        preBuild:
          commands:
            # Amplify Hosting shares cwd across commands (and phases); we
            # start at appRoot (web/) and chain relative paths from there.
            # 1) Build the qcsim wheel that JupyterLite ships into Pyodide.
            - python3 -m pip install --user --quiet build
            - cd ../qcsim && python3 -m build --wheel
            # 2) Build the in-browser JupyterLite distribution.
            #    Outputs to web/public/lab/ which Next.js then ships statically.
            - cd ../web/jupyterlite-build && bash build.sh
            # 3) Standard Node deps (back to appRoot for the build phase).
            - cd .. && npm ci
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: out
        files:
          - "**/*"
      cache:
        paths:
          - node_modules/**/*
          - jupyterlite-build/.venv/**/*
          - jupyterlite-build/.cache/**/*
