version: 1
applications:
  - appRoot: web
    frontend:
      phases:
        preBuild:
          commands:
            # Amplify Hosting shares cwd across commands (and phases); we
            # start at appRoot (web/) and chain relative paths from there.
            # Build the in-browser JupyterLite distribution. build.sh is
            # self-contained: it creates its own venv (installing `build`),
            # builds the qcsim wheel, stages notebooks + lib/, and outputs to
            # web/public/lab/ which Next.js then ships statically.
            - cd ../web/jupyterlite-build && bash build.sh
            # Standard Node deps (back to appRoot for the build phase).
            - cd .. && npm ci
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: out
        files:
          - "**/*"
      cache:
        paths:
          - node_modules/**/*
          - jupyterlite-build/.venv/**/*
          - jupyterlite-build/.cache/**/*
